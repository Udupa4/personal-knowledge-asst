<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>knowledge assistant</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────────────────────────────── -->
<div id="view-login" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#6ee7b7" fill-opacity="0.15"/>
        <path d="M9 14c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5" stroke="#6ee7b7" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="14" cy="14" r="2" fill="#6ee7b7"/>
        <path d="M14 7v2M14 19v2M7 14h2M19 14h2" stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="login-logo-text">knowledge assistant</span>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="login">sign in</button>
      <button class="tab-btn" data-tab="register">register</button>
    </div>

    <!-- login form -->
    <div id="tab-login" class="tab-panel active">
      <div class="field">
        <label>email</label>
        <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>password</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="login-error" class="form-error hidden"></div>
      <button id="login-btn" class="primary-btn" onclick="handleLogin()">sign in</button>
    </div>

    <!-- register form -->
    <div id="tab-register" class="tab-panel">
      <div class="field">
        <label>email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>password</label>
        <input id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div id="reg-error" class="form-error hidden"></div>
      <div id="reg-success" class="form-success hidden"></div>
      <button id="reg-btn" class="primary-btn" onclick="handleRegister()">create account</button>
    </div>
  </div>
</div>

<!-- ── APP SHELL (chat + memory) ─────────────────────────────────────────── -->
<div id="view-app" class="app-shell hidden">

  <!-- sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
        <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="#6ee7b7" fill-opacity="0.15"/>
          <path d="M9 14c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5" stroke="#6ee7b7" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="2" fill="#6ee7b7"/>
          <path d="M14 7v2M14 19v2M7 14h2M19 14h2" stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span>knowledge assistant</span>
      </div>

      <button class="new-session-btn" onclick="createSession()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        new session
      </button>

      <div class="session-list" id="session-list">
        <!-- populated by JS -->
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="nav-tabs">
        <button class="nav-tab active" id="nav-chat" onclick="switchView('chat')">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M1.5 2.5h12a1 1 0 011 1v7a1 1 0 01-1 1H4.5l-3 2V3.5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          chat
        </button>
        <button class="nav-tab" id="nav-memory" onclick="switchView('memory')">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M5 7.5c0-1.38 1.12-2.5 2.5-2.5S10 6.12 10 7.5 8.88 10 7.5 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="7.5" cy="7.5" r="1" fill="currentColor"/>
          </svg>
          memory
        </button>
      </div>
      <button class="logout-btn" onclick="handleLogout()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M5 2H2.5A1.5 1.5 0 001 3.5v7A1.5 1.5 0 002.5 12H5M9 10l3-3-3-3M12 7H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        logout
      </button>
    </div>
  </aside>

  <!-- ── CHAT VIEW ───────────────────────────────────────────────────────── -->
  <main id="view-chat" class="main-panel">
    <!-- Chat Header -->
    <div id="chat-header" class="chat-header hidden">
      <div class="chat-header-title">
        <span class="status-indicator"></span>
        <span id="chat-header-session-name">Session</span>
      </div>
      <button class="end-session-btn" onclick="handleEndCurrentSession()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        </svg>
        End Session (Save to LTM)
      </button>
    </div>

    <!-- Loading Overlay -->
    <div id="chat-loading-overlay" class="loading-overlay hidden">
      <div class="loading-overlay-content">
        <div class="dot-pulse">
          <span></span><span></span><span></span>
        </div>
        <div class="loading-overlay-text">distilling conversation & saving to memory…</div>
      </div>
    </div>

    <div id="chat-empty" class="empty-state">
      <div class="empty-icon">
        <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
          <path d="M9 14c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5" stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="2" fill="#6ee7b7"/>
          <path d="M14 7v2M14 19v2M7 14h2M19 14h2" stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="empty-title">ready when you are</p>
      <p class="empty-sub">create or select a session to start</p>
    </div>

    <div id="chat-messages" class="messages"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="chat-input"
          placeholder="ask something…"
          rows="1"
          onkeydown="handleInputKey(event)"
          oninput="autoResize(this)"
          disabled
        ></textarea>
        <button id="send-btn" class="send-btn" onclick="sendMessage()" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 13V3M3 8l5-5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">shift+enter for new line</p>
    </div>
  </main>

  <!-- ── MEMORY VIEW ─────────────────────────────────────────────────────── -->
  <main id="view-memory" class="main-panel hidden">
    <div class="memory-header">
      <h2>long-term memory</h2>
      <button class="refresh-btn" onclick="loadMemory()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1.5 7A5.5 5.5 0 0112 4.5M12.5 7A5.5 5.5 0 012 9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M10 2.5l2 2-2 2M4 9.5l-2 2 2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        refresh
      </button>
    </div>
    <div id="memory-list" class="memory-list">
      <div class="memory-loading">loading memories…</div>
    </div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
